services:
  postgres:
    image: postgres:16
    container_name: nexfut-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexfut
      POSTGRES_PASSWORD: nexfut
      POSTGRES_DB: nexfut
    ports:
      - "5432:5432"
    volumes:
      - nexfut_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexfut -d nexfut"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nexfut_postgres_data:
