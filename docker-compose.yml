services:
  postgres:
    image: postgres:16
    container_name: nextfut-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nextfut
      POSTGRES_PASSWORD: nextfut
      POSTGRES_DB: nextfut
    ports:
      - "5432:5432"
    volumes:
      - nextfut_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextfut -d nextfut"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: nextfut-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: postgresql://nextfut:nextfut@postgres:5432/nextfut?schema=public
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: ./frontend
    container_name: nextfut-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  nextfut_postgres_data:
